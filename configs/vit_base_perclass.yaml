experiment_name: "vit_base_perclass"

# ── Data ──
data:
  data_dir: "CheXpert-v1.0-small"
  train_csv: "CheXpert-v1.0-small/train_proper.csv"
  valid_csv: "CheXpert-v1.0-small/val_proper.csv"
  test_csv:  "CheXpert-v1.0-small/test.csv"
  image_size: 224
  frontal_only: true

  # Same per-label strategy as Run 008 (Swin perclass)
  uncertainty_strategy: "u-mixed"
  per_label_strategies:
    Cardiomegaly: "u-zeros"
    Edema: "u-ones"
    Consolidation: "u-ones"
    Atelectasis: "u-ones"
    Pleural Effusion: "u-zeros"

# ── Labels ──
labels:
  target_labels:
    - "Cardiomegaly"
    - "Edema"
    - "Consolidation"
    - "Atelectasis"
    - "Pleural Effusion"

# ── Model ──
model:
  architecture: "vit_base"
  pretrained: true
  num_classes: 5

# ── Training ──
training:
  batch_size: 64
  num_workers: 4
  epochs: 30
  learning_rate: 0.00003   # ViT needs lower LR than Swin
  weight_decay: 0.1        # standard for ViT (original paper)
  warmup_epochs: 2
  scheduler: "cosine"
  early_stopping_patience: 7
  pos_weight: true

# ── Device ──
device: "auto"

# ── Logging ──
logging:
  checkpoint_dir: "checkpoints"
  log_dir: "runs"
  save_best_only: true
