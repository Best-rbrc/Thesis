experiment_name: "vit_base"

# ── Data ──
data:
  data_dir: "CheXpert-v1.0-small"
  train_csv: "CheXpert-v1.0-small/train_proper.csv"  # 95% of train_split.csv (patient-level)
  valid_csv: "CheXpert-v1.0-small/val_proper.csv"    # 5%  of train_split.csv (~9.6k samples)
  test_csv:  "CheXpert-v1.0-small/test.csv"          # 15% held-out for final evaluation only
  image_size: 224
  frontal_only: true
  uncertainty_strategy: "u-mask"

# ── Labels ──
labels:
  target_labels:
    - "Cardiomegaly"
    - "Edema"
    - "Consolidation"
    - "Atelectasis"
    - "Pleural Effusion"

# ── Model ──
model:
  architecture: "vit_base"
  pretrained: true
  num_classes: 5

# ── Training ──
training:
  batch_size: 64
  num_workers: 2
  epochs: 30
  learning_rate: 0.00003   # slightly lower than Swin — ViT-Base is more sensitive
  weight_decay: 0.1         # ViT-Base needs stronger regularization than Swin
  warmup_epochs: 2          # shorter warmup = more effective training epochs
  scheduler: "cosine"
  early_stopping_patience: 7

# ── Device ──
device: "auto"  # "auto", "mps", "cuda", "cpu"

# ── Logging ──
logging:
  checkpoint_dir: "checkpoints"
  log_dir: "runs"
  save_best_only: true
